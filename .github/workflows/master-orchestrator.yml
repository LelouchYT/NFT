name: Master Albion Orchestrator

on:
  workflow_dispatch: # Triggered by Cron-Job.org or manual dashboard execution

permissions:
  actions: write # Crucial: Grants authorization to trigger and monitor downstream workflows

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Sequential Synchronization Pipeline
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref;

            // Engine to dispatch a workflow and await its complete successful execution
            async function runWorkflowAndBlock(workflowFile, friendlyName) {
              console.log(`🚀 Dispatching: ${friendlyName} (${workflowFile})...`);
              
              // 1. Fire the dispatch request
              await github.rest.actions.createWorkflowDispatch({
                owner, 
                repo, 
                workflow_id: workflowFile, 
                ref
              });

              // 2. Allow GitHub Actions API a short processing window to spin up the run instance
              await new Promise(resolve => setTimeout(resolve, 10000));

              // 3. Locate the run ID of the workflow we just fired
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, 
                repo, 
                workflow_id: workflowFile, 
                per_page: 1
              });

              if (runs.data.workflow_runs.length === 0) {
                throw new Error(`Failed to isolate tracking context for target: ${friendlyName}`);
              }

              const runId = runs.data.workflow_runs[0].id;
              console.log(`🔗 Tracking Active Run ID: ${runId}. Monitoring telemetry data loops...`);

              // 4. Actively poll execution status until it hits a finalized conclusion
              while (true) {
                await new Promise(resolve => setTimeout(resolve, 12000)); // Poll every 12 seconds
                
                const check = await github.rest.actions.getWorkflowRun({
                  owner, 
                  repo, 
                  run_id: runId
                });
                
                const status = check.data.status;
                const conclusion = check.data.conclusion;

                console.log(`⏳ [${friendlyName}] -> Status: ${status.toUpperCase()} | Conclusion: ${conclusion ? conclusion.toUpperCase() : 'IN-PROGRESS'}`);

                if (status === 'completed') {
                  if (conclusion === 'success') {
                    console.log(`✅ ${friendlyName} processed successfully structural modifications written.\n`);
                    break;
                  } else {
                    throw new Error(`❌ ${friendlyName} halted unexpected exception context: ${conclusion}`);
                  }
                }
              }
            }

            // High-Level Orchestration Execution Pattern
            try {
              // Syncs Core Statistics
              await runWorkflowAndBlock('fetch-guild.yml', 'Guild Core Stats Sync');
              
              // Syncs PVP Leaderboards
              await runWorkflowAndBlock('fetch-top.yml', 'Top Kills Sync');
              
              // Syncs Guild Membership Matrix
              await runWorkflowAndBlock('fetch-members.yml', 'Members List Sync');
              
              // Syncs Battleboard Logs 
              await runWorkflowAndBlock('fetch-battles.yml', 'Battleboards Sync');
              
              console.log("🎉 Data pipeline processing sequence completed with flawless git synchronization!");
            } catch (error) {
              core.setFailed(`Critical Orchestrator Abort Sequence: ${error.message}`);
            }