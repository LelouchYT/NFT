name: Fetch Albion Battle Boards Data

on:
  workflow_dispatch: # Handled exclusively by the Master Orchestrator or manual overrides

# Force the runner to execute all JavaScript actions using Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write # Grants write permissions to your repository to commit the data file

jobs:
  update-battle-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Fetch Recent Battle Logs from Albion API (With Smart Retries)
        run: |
          API_URL="https://gameinfo.albiononline.com/api/gameinfo/battles?range=months&offset=0&limit=51&guildId=AIbIw4erSVyHg9Ab6LVtdA"
          
          # Try up to 3 times for these heavy data chunks
          for i in {1..3}; do
            echo "Attempt $i: Initiating heavy retrieval sequence from Albion Online API..."
            
            # Using an extended 60-second execution max-time for massive battle payloads
            curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                 --max-time 60 \
                 "$API_URL" -o battle-data.json
            
            # Strict multi-layer validation check (File sizing + schema syntax validation)
            if [ -s battle-data.json ] && jq '.' battle-data.json >/dev/null 2>&1; then
              echo "Success: Dataset captured and verified as secure valid JSON format on attempt $i."
              break
            fi
            
            if [ $i -lt 3 ]; then
              echo "Attempt $i failed, timed out, or caught in anti-bot block. Sleeping 20 seconds before retry..."
              sleep 20
            else
              echo "Critical Error: Heavy battle logs payload failed to validate cleanly after 3 attempts."
              exit 1
            fi
          done

      - name: Commit and Push Updated Dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if changes exist to avoid empty commit errors
          if git status --porcelain | grep -q "battle-data.json"; then
            git add battle-data.json
            git commit -m "chore: automated refresh of outlands battleboard metrics [skip ci]"
            git push origin main
            echo "Database updated successfully across the cloud deployment vectors."
          else
            echo "No operational data shifts uncovered. Database state remains unchanged."
          fi
